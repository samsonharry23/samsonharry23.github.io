<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1206"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="650" cy="90" r="170" fill="#f59e0b" opacity="0.16"/>
  <circle cx="130" cy="380" r="150" fill="#facc15" opacity="0.12"/>

  <!-- pizza -->
  <g transform="translate(400 210)">
    <circle r="135" fill="#facc15"/>
    <circle r="135" fill="none" stroke="#b45309" stroke-width="10"/>
    <circle r="118" fill="#f59e0b"/>
    <circle r="100" fill="#dc2626" opacity="0.92"/>
    <!-- pepperoni -->
    <g fill="#7f1d1d">
      <circle cx="-45" cy="-35" r="15"/>
      <circle cx="40" cy="-45" r="15"/>
      <circle cx="55" cy="30" r="15"/>
      <circle cx="-20" cy="45" r="15"/>
      <circle cx="-60" cy="25" r="13"/>
      <circle cx="10" cy="0" r="14"/>
    </g>
    <!-- basil -->
    <g fill="#16a34a">
      <ellipse cx="20" cy="-20" rx="9" ry="5" transform="rotate(30 20 -20)"/>
      <ellipse cx="-35" cy="0" rx="9" ry="5" transform="rotate(-20 -35 0)"/>
      <ellipse cx="35" cy="55" rx="9" ry="5" transform="rotate(50 35 55)"/>
    </g>
  </g>

  <text x="400" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#fde68a" text-anchor="middle">🍕 QuickBite</text>
</svg>
