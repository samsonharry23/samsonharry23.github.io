<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- glow -->
  <circle cx="640" cy="90" r="180" fill="#a855f7" opacity="0.18"/>
  <circle cx="140" cy="380" r="160" fill="#22d3ee" opacity="0.14"/>
  <!-- clapperboard -->
  <g transform="translate(300 150)">
    <rect x="0" y="40" width="200" height="130" rx="10" fill="#111827" stroke="url(#accent)" stroke-width="3"/>
    <g transform="rotate(-12 0 40)">
      <rect x="-6" y="6" width="212" height="42" rx="8" fill="#111827" stroke="url(#accent)" stroke-width="3"/>
      <g fill="url(#accent)">
        <polygon points="6,48 30,8 52,8 28,48"/>
        <polygon points="58,48 82,8 104,8 80,48"/>
        <polygon points="110,48 134,8 156,8 132,48"/>
        <polygon points="162,48 186,8 208,8 184,48"/>
      </g>
    </g>
  </g>
  <!-- stars -->
  <g fill="#fbbf24" transform="translate(330 250)">
    <path d="M0 0 l6 13 14 2 -10 10 3 14 -13 -7 -13 7 3 -14 -10 -10 14 -2z" transform="translate(0 0) scale(1.1)"/>
    <path d="M0 0 l6 13 14 2 -10 10 3 14 -13 -7 -13 7 3 -14 -10 -10 14 -2z" transform="translate(45 0) scale(1.1)"/>
    <path d="M0 0 l6 13 14 2 -10 10 3 14 -13 -7 -13 7 3 -14 -10 -10 14 -2z" transform="translate(90 0) scale(1.1)"/>
    <path d="M0 0 l6 13 14 2 -10 10 3 14 -13 -7 -13 7 3 -14 -10 -10 14 -2z" transform="translate(135 0) scale(1.1)"/>
  </g>
  <text x="400" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#f1f5f9" text-anchor="middle">🎬 Movie Rating</text>
</svg>
