<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="650" cy="90" r="170" fill="#6366f1" opacity="0.16"/>
  <circle cx="130" cy="380" r="150" fill="#8b5cf6" opacity="0.12"/>

  <!-- hotel building -->
  <g transform="translate(310 110)">
    <rect x="0" y="40" width="180" height="220" rx="6" fill="#1e293b" stroke="url(#accent)" stroke-width="3"/>
    <!-- roof sign -->
    <rect x="40" y="14" width="100" height="30" rx="5" fill="url(#accent)"/>
    <text x="90" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">HOTEL</text>
    <!-- windows grid -->
    <g fill="#fcd34d" opacity="0.92">
      <rect x="22" y="64" width="26" height="26" rx="3"/>
      <rect x="77" y="64" width="26" height="26" rx="3"/>
      <rect x="132" y="64" width="26" height="26" rx="3"/>
      <rect x="22" y="108" width="26" height="26" rx="3"/>
      <rect x="77" y="108" width="26" height="26" rx="3" fill="#64748b"/>
      <rect x="132" y="108" width="26" height="26" rx="3"/>
      <rect x="22" y="152" width="26" height="26" rx="3" fill="#64748b"/>
      <rect x="77" y="152" width="26" height="26" rx="3"/>
      <rect x="132" y="152" width="26" height="26" rx="3"/>
    </g>
    <!-- door -->
    <rect x="72" y="200" width="36" height="60" rx="4" fill="url(#accent)"/>
    <circle cx="100" cy="232" r="2.5" fill="#fff"/>
  </g>

  <text x="400" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#e2e8f0" text-anchor="middle">🏨 StayManager</text>
</svg>
