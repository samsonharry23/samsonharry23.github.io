<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0e2a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="globe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#155e75"/>
      <stop offset="100%" stop-color="#0c2430"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="650" cy="80" r="170" fill="#22d3ee" opacity="0.12"/>
  <circle cx="130" cy="380" r="150" fill="#34d399" opacity="0.12"/>

  <!-- globe -->
  <g transform="translate(400 215)">
    <circle r="135" fill="url(#globe)" stroke="url(#accent)" stroke-width="3"/>
    <!-- latitude lines -->
    <g fill="none" stroke="#22d3ee" stroke-width="1.4" opacity="0.5">
      <ellipse rx="135" ry="45"/>
      <ellipse rx="135" ry="90"/>
      <ellipse rx="120" ry="135"/>
      <ellipse rx="60" ry="135"/>
      <line x1="-135" y1="0" x2="135" y2="0"/>
    </g>
    <!-- location pins -->
    <g>
      <g transform="translate(-55 -50)">
        <path d="M0 0 C -13 -22 -13 -34 0 -34 C 13 -34 13 -22 0 0 Z" fill="#f43f5e"/>
        <circle cy="-22" r="5" fill="#fff"/>
      </g>
      <g transform="translate(40 -15)">
        <path d="M0 0 C -13 -22 -13 -34 0 -34 C 13 -34 13 -22 0 0 Z" fill="#fbbf24"/>
        <circle cy="-22" r="5" fill="#fff"/>
      </g>
      <g transform="translate(15 70)">
        <path d="M0 0 C -13 -22 -13 -34 0 -34 C 13 -34 13 -22 0 0 Z" fill="#34d399"/>
        <circle cy="-22" r="5" fill="#fff"/>
      </g>
    </g>
  </g>

  <text x="400" y="415" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#f1f5f9" text-anchor="middle">🌍 TravelWorld</text>
</svg>
